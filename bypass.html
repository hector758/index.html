<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MortyHub - Bypass Tool 😈</title>
    <style>
        :root { --neon: #00ff99; --bg: #050505; }
        body { 
            background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .panel {
            background: #111; border: 2px solid var(--neon); padding: 30px;
            border-radius: 10px; box-shadow: 0 0 20px rgba(0,255,153,0.3);
            width: 90%; max-width: 450px; text-align: center;
        }
        h1 { text-shadow: 0 0 10px var(--neon); font-size: 1.5rem; }
        input {
            width: 100%; padding: 12px; margin: 15px 0; background: #000;
            border: 1px solid var(--neon); color: white; border-radius: 5px;
            outline: none; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; background: var(--neon); color: #000;
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        button:hover { box-shadow: 0 0 20px var(--neon); transform: scale(1.02); }
        #status { margin-top: 20px; font-size: 0.9rem; }
        .result-box {
            margin-top: 20px; padding: 10px; border: 1px dashed var(--neon);
            display: none; word-break: break-all;
        }
        a { color: white; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="panel">
    <h1>MORTYHUB BYPASS</h1>
    <p style="font-size: 0.7rem; color: #888;">Powered by Bypass.City Logic</p>
    <input type="text" id="urlInput" placeholder="Pega el link de Linkvertise o LootLink...">
    <button onclick="startBypass()">Ejecutar Bypass ⚡</button>
    
    <div id="status">Esperando link...</div>
    <div id="resultBox" class="result-box"></div>
</div>

<script>
    async function startBypass() {
        const url = document.getElementById('urlInput').value;
        const status = document.getElementById('status');
        const resultBox = document.getElementById('resultBox');

        if(!url) return alert("Introduce una URL");

        status.innerHTML = "Inyectando solicitud... 🛠️";
        resultBox.style.display = "none";

        try {
            // Usamos la API de adbypass que es la que usa el script que pasaste
            const apiUrl = `https://api.adbypass.org/bypass?url=${encodeURIComponent(url)}`;
            
            const response = await fetch(apiUrl);
            const data = await response.json();

            if(data.success && data.destination) {
                status.innerHTML = "✅ BYPASS EXITOSO";
                resultBox.style.display = "block";
                resultBox.innerHTML = `<a href="${data.destination}" target="_blank">CLIC PARA ABRIR DESTINO</a>`;
            } else {
                status.innerHTML = "❌ Error: Link no soportado.";
            }
        } catch (e) {
            // Si la anterior falla, intentamos con la de respaldo
            status.innerHTML = "Intentando servidor secundario...";
            try {
                const res2 = await fetch(`https://bypass.pm/api/bypass?url=${encodeURIComponent(url)}`);
                const data2 = await res2.json();
                if(data2.destination) {
                    status.innerHTML = "✅ BYPASS EXITOSO (Backup)";
                    resultBox.style.display = "block";
                    resultBox.innerHTML = `<a href="${data2.destination}" target="_blank">CLIC PARA ABRIR DESTINO</a>`;
                } else {
                    status.innerHTML = "❌ API caída. Intenta más tarde.";
                }
            } catch(err) {
                status.innerHTML = "❌ Error de conexión total.";
            }
        }
    }
</script>

</body>
</html>
