<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORTYHUB BYPASS 😈</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { border: 2px solid #0f0; padding: 20px; border-radius: 10px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 15px #0f0; }
        input { width: 100%; padding: 10px; background: #111; border: 1px solid #0f0; color: #fff; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-size: 14px; }
        .link-final { display: block; margin-top: 15px; color: #fff; background: #222; padding: 10px; border: 1px dashed #0f0; text-decoration: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>MORTYHUB BYPASS</h2>
    <input type="text" id="url" placeholder="Pega el link de Linkvertise...">
    <button onclick="unlock()">DESBLOQUEAR ENLACE ⚡</button>
    <div id="status">Esperando...</div>
</div>

<script>
    async function unlock() {
        const url = document.getElementById('url').value;
        const status = document.getElementById('status');
        
        if(!url.includes('linkvertise') && !url.includes('link-hub') && !url.includes('direct-link')) {
            return status.innerHTML = "❌ ¡Eso no es un link de Linkvertise!";
        }

        status.innerHTML = "Inyectando bypass... ⏳";

        try {
            // Esta es una de las APIs más estables actualmente
            const response = await fetch(`https://api.bypass.vip/bypass?url=${encodeURIComponent(url)}`);
            const data = await response.json();

            if (data.destination) {
                status.innerHTML = "✅ ENLACE ENCONTRADO:";
                status.innerHTML += `<a class="link-final" href="${data.destination}" target="_blank">IR AL ARCHIVO / SCRIPT</a>`;
            } else {
                // Si la primera falla, intentamos con la segunda inmediatamente
                status.innerHTML = "Reintentando por servidor secundario... 🛠️";
                const res2 = await fetch(`https://bypass.city/api/free/bypass?url=${encodeURIComponent(url)}`);
                const data2 = await res2.json();
                
                if(data2.destination) {
                    status.innerHTML = "✅ ENLACE ENCONTRADO:";
                    status.innerHTML += `<a class="link-final" href="${data2.destination}" target="_blank">IR AL ARCHIVO / SCRIPT</a>`;
                } else {
                    status.innerHTML = "❌ Error: Link protegido o API caída. Prueba con otro link.";
                }
            }
        } catch (e) {
            status.innerHTML = "❌ Error de conexión. Linkvertise bloqueó la petición.";
        }
    }
</script>

</body>
</html>
