<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass Tool</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        input { width: 80%; padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #7289da; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; word-break: break-all; color: #43b581; }
    </style>
</head>
<body>
    <h2>Bypass Linkvertise</h2>
    <input type="text" id="linkInput" placeholder="Pega el link de Linkvertise aquí">
    <br>
    <button onclick="getBypass()">Saltar Enlace</button>
    <div id="result"></div>

    <script>
        async function getBypass() {
            const link = document.getElementById('linkInput').value;
            const resDiv = document.getElementById('result');
            resDiv.innerText = "Procesando...";

            try {
                // Ejemplo usando una API pública (Nota: las APIs cambian o mueren, debes buscar una activa)
                const response = await fetch(`https://api.bypass.vip/bypass?url=${encodeURIComponent(link)}`);
                const data = await response.json();
                
                if(data.destination) {
                    resDiv.innerHTML = `<a href="${data.destination}" style="color: cyan" target="_blank">¡Click aquí para ir al destino!</a>`;
                } else {
                    resDiv.innerText = "Error: No se pudo obtener el link.";
                }
            } catch (error) {
                resDiv.innerText = "Error de conexión con la API.";
            }
        }
    </script>
</body>
</html>
