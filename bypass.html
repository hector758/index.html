<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass Tool 😈</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0a0a0a; 
            color: #00ff99; 
            padding: 20px; 
            text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #151515;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #00ff99;
            box-shadow: 0 0 20px rgba(0, 255, 153, 0.2);
            max-width: 400px; width: 90%;
        }
        h2 { text-shadow: 0 0 10px #00ff99; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; 
            background: #222; color: white; margin-bottom: 15px; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 12px; background: #00ff99; color: #000; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #00cc7a; box-shadow: 0 0 15px #00ff99; }
        #result { margin-top: 20px; font-weight: bold; word-break: break-all; }
        .success-link { color: #fff; background: #1db954; padding: 10px; border-radius: 5px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Bypass Linkvertise</h2>
        <input type="text" id="linkInput" placeholder="Pega el link aquí...">
        <button onclick="getBypass()">SALTAR ENLACE 😈</button>
        <div id="result"></div>
    </div>

    <script>
        async function getBypass() {
            const link = document.getElementById('linkInput').value;
            const resDiv = document.getElementById('result');
            if(!link) return alert("Pega un link primero");

            resDiv.innerHTML = "<span style='color: #888'>Buscando ruta... ⏳</span>";

            try {
                // Usando una API alternativa más robusta
                const response = await fetch(`https://bypass.pm/api/bypass?url=${encodeURIComponent(link)}`);
                const data = await response.json();
                
                if(data.destination || data.result) {
                    const finalUrl = data.destination || data.result;
                    resDiv.innerHTML = `<a href="${finalUrl}" class="success-link" target="_blank">IR AL DESTINO ✅</a>`;
                } else {
                    resDiv.innerHTML = "<span style='color: #ff4444'>Error: Link no soportado o API caída.</span>";
                }
            } catch (error) {
                resDiv.innerHTML = "<span style='color: #ff4444'>Error de conexión. Intenta de nuevo.</span>";
            }
        }
    </script>
</body>
</html>
