<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORTYHUB - ROLKI SYSTEM 😈</title>
    <style>
        :root { --glow: #00ffff; --dark: #080808; }
        body { background: var(--dark); color: var(--glow); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { border: 1px solid var(--glow); padding: 25px; border-radius: 5px; background: #111; box-shadow: 0 0 15px rgba(0,255,255,0.2); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--glow); }
        button { width: 100%; padding: 12px; background: var(--glow); color: #000; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { box-shadow: 0 0 10px var(--glow); opacity: 0.8; }
        #output { margin-top: 20px; font-size: 0.85rem; min-height: 40px; }
        .btn-final { display: inline-block; margin-top: 10px; padding: 10px; background: #fff; color: #000; text-decoration: none; border-radius: 3px; font-weight: bold; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0">MORTYHUB BYPASS</h2>
    <p style="font-size: 10px; color: #555">ROLKI-PNG SYSTEM ADAPTED</p>
    
    <input type="text" id="targetUrl" placeholder="https://linkvertise.com/...">
    <button onclick="executeBypass()">BYPASS LINK ⚡</button>
    
    <div id="output">Esperando señal...</div>
</div>

<script>
    async function executeBypass() {
        const url = document.getElementById('targetUrl').value;
        const out = document.getElementById('output');

        if (!url) return alert("Ingresa un link");

        out.innerHTML = "<span style='color: #888'>Conectando con el servidor... 📡</span>";

        try {
            // Adaptación de la lógica del repo: usamos una de las APIs que el sistema de Rolki consulta
            const api = `https://api.adsbypasser.com/bypass?url=${encodeURIComponent(url)}`;
            
            const response = await fetch(api);
            const data = await response.json();

            if (data.success || data.destination) {
                const final = data.destination || data.result;
                out.innerHTML = `<span style="color: #0f0">¡ÉXITO!</span><br>
                                 <a href="${final}" target="_blank" class="btn-final">ABRIR ENLACE DESBLOQUEADO</a>`;
            } else {
                // Intento 2 con la API de respaldo de ese mismo sistema
                out.innerHTML = "Intentando nodo secundario... 🛠️";
                const res2 = await fetch(`https://bypass.pm/api/bypass?url=${encodeURIComponent(url)}`);
                const data2 = await res2.json();
                
                if (data2.destination) {
                    out.innerHTML = `<span style="color: #0f0">¡ÉXITO (Nodo 2)!</span><br>
                                     <a href="${data2.destination}" target="_blank" class="btn-final">ABRIR ENLACE</a>`;
                } else {
                    out.innerHTML = "<span style='color: #f00'>Error: Sistema de Rolki no pudo saltar este link.</span>";
                }
            }
        } catch (err) {
            out.innerHTML = "<span style='color: #f00'>Error de red. Bloqueado por CORS.</span>";
        }
    }
</script>

</body>
</html>
