<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass MortyHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green: #00ff99;
            --green-dim: #00cc7a;
            --green-glow: rgba(0, 255, 153, 0.35);
            --red: #ff3c3c;
            --bg: #080b0a;
            --panel: #0d1210;
            --border: #1a2e22;
            --text: #b0ffd6;
            --mono: 'Share Tech Mono', monospace;
            --display: 'Orbitron', sans-serif;
        }

        body {
            font-family: var(--mono);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,153,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,153,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            animation: gridShift 20s linear infinite;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(0,255,153,0.05) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gridShift {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 40px 40px, 40px 40px; }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
        }

        /* Corner decorations */
        .frame {
            position: relative;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 36px 32px 32px;
            clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
            box-shadow:
                0 0 40px rgba(0,255,153,0.08),
                inset 0 0 40px rgba(0,0,0,0.6);
        }

        .frame::before, .frame::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: var(--green);
            border-style: solid;
        }
        .frame::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .frame::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .badge {
            display: inline-block;
            font-size: 10px;
            letter-spacing: 4px;
            color: var(--green-dim);
            border: 1px solid var(--border);
            padding: 4px 12px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        h1 {
            font-family: var(--display);
            font-size: 26px;
            font-weight: 900;
            color: var(--green);
            text-shadow: 0 0 20px var(--green-glow), 0 0 40px rgba(0,255,153,0.15);
            letter-spacing: 2px;
            line-height: 1.1;
        }

        h1 span {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: rgba(0,255,153,0.5);
            letter-spacing: 6px;
            margin-top: 4px;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            opacity: 0.4;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--green);
        }
        .divider-icon { font-size: 11px; color: var(--green); white-space: nowrap; letter-spacing: 2px; }

        /* Input */
        .input-wrap {
            position: relative;
            margin-bottom: 14px;
        }

        .input-label {
            display: block;
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(0,255,153,0.5);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 13px 16px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            color: #fff;
            font-family: var(--mono);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]::placeholder { color: rgba(255,255,255,0.2); }

        input[type="text"]:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 1px var(--green), 0 0 20px rgba(0,255,153,0.1);
        }

        /* Button */
        button {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--green);
            color: var(--green);
            font-family: var(--display);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: color 0.2s, box-shadow 0.2s;
        }

        button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--green);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.25s ease;
            z-index: 0;
        }

        button:hover::before { transform: scaleX(1); }
        button:hover { color: #000; box-shadow: 0 0 25px var(--green-glow); }
        button span { position: relative; z-index: 1; }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Result area */
        #result {
            margin-top: 20px;
            min-height: 52px;
            font-size: 12px;
            line-height: 1.6;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            background: rgba(0,0,0,0.4);
            border-left: 2px solid;
        }

        .status-bar.loading { border-color: rgba(0,255,153,0.4); color: rgba(0,255,153,0.7); }
        .status-bar.error   { border-color: var(--red); color: var(--red); }
        .status-bar.success { border-color: var(--green); }

        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            animation: pulse 1.2s ease-in-out infinite;
        }
        .loading .dot { background: var(--green); }
        .error   .dot { background: var(--red); animation: none; }
        .success .dot { background: var(--green); animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .go-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            width: 100%;
            padding: 14px 18px;
            background: var(--green);
            color: #000;
            font-family: var(--display);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-decoration: none;
            text-transform: uppercase;
            justify-content: center;
            transition: background 0.2s, box-shadow 0.2s;
        }

        .go-btn:hover {
            background: #fff;
            box-shadow: 0 0 30px var(--green-glow);
        }

        .url-preview {
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(0,255,153,0.04);
            border: 1px solid var(--border);
            font-size: 10px;
            color: rgba(0,255,153,0.4);
            word-break: break-all;
            letter-spacing: 0.5px;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 18px;
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(0,255,153,0.2);
        }

        /* Scanline effect */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        .scanline {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(transparent, rgba(0,255,153,0.06), transparent);
            animation: scanline 6s linear infinite;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div class="container">
        <div class="frame">
            <div class="header">
                <div class="badge">▸ TOOL v2.0 ◂</div>
                <h1>
                    BYPASS
                    <span>MORTYHUB</span>
                </h1>
            </div>

            <div class="divider">
                <span class="divider-icon">◈ LINK RESOLVER ◈</span>
            </div>

            <label class="input-label">▸ TARGET URL</label>
            <div class="input-wrap">
                <input type="text" id="linkInput" placeholder="https://linkvertise.com/...">
            </div>

            <button onclick="getBypass()" id="bypassBtn">
                <span>⚡ SALTAR ENLACE</span>
            </button>

            <div id="result"></div>
        </div>

        <div class="footer">SYS:OK &nbsp;|&nbsp; MORTYHUB &nbsp;|&nbsp; 2025</div>
    </div>

    <script>
        async function getBypass() {
            const link = document.getElementById('linkInput').value.trim();
            const resDiv = document.getElementById('result');
            const btn = document.getElementById('bypassBtn');

            if (!link) {
                resDiv.innerHTML = `
                    <div class="status-bar error">
                        <div class="dot"></div>
                        <span>ERROR: Pega un link primero.</span>
                    </div>`;
                return;
            }

            btn.disabled = true;
            resDiv.innerHTML = `
                <div class="status-bar loading">
                    <div class="dot"></div>
                    <span>Resolviendo enlace... por favor espera.</span>
                </div>`;

            const apis = [
                `https://bypass.city/api/bypass?url=${encodeURIComponent(link)}`,
                `https://api.bypass.vip/bypass?url=${encodeURIComponent(link)}`,
            ];

            let finalUrl = null;

            for (const apiUrl of apis) {
                try {
                    const res = await fetch(apiUrl, { signal: AbortSignal.timeout(8000) });
                    if (!res.ok) continue;
                    const data = await res.json();
                    const url = data.destination || data.result || data.bypassed || data.url || data.data;
                    if (url && url.startsWith('http')) {
                        finalUrl = url;
                        break;
                    }
                } catch (_) { /* try next */ }
            }

            btn.disabled = false;

            if (finalUrl) {
                resDiv.innerHTML = `
                    <div class="status-bar success">
                        <div class="dot"></div>
                        <span>ENLACE RESUELTO EXITOSAMENTE</span>
                    </div>
                    <div class="url-preview">${finalUrl}</div>
                    <a class="go-btn" href="${finalUrl}" target="_blank" rel="noopener">
                        ▸ IR AL DESTINO ✓
                    </a>`;
            } else {
                resDiv.innerHTML = `
                    <div class="status-bar error">
                        <div class="dot"></div>
                        <span>ERROR: Link no soportado o APIs caídas. Intenta más tarde.</span>
                    </div>`;
            }
        }

        document.getElementById('linkInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') getBypass();
        });
    </script>
</body>
</html>
